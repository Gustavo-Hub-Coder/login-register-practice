<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <section class="container">
        <h1>Create account</h1>
        <p>Create an account to access all features of the website.</p>
        <form action="">
        <input type="text" placeholder="Username" id="input-username">

        <input type="text" placeholder="Email" id="input-email">

        <input type="password" placeholder="Password" id="input-password">

        <input type="password" placeholder="Confirm password" id="input-confirm-password">

        <button id="signup-btn">Create account</button>
        <button id="delete-accounts-btn" type="button" >Delete all accounts</button>
    </form>
    </section>

    <script src="/assets/js/signUp.js"></script>
</body>
</html>
